<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamZone — Vizionare</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #1a0a0e;
            --bg-secondary: #2a1118;
            --bg-card: #321520;
            --bg-card-hover: #3d1a28;
            --burgundy-dark: #5c1f28;
            --burgundy: #7b2e3a;
            --burgundy-mid: #8b3345;
            --burgundy-light: #a0404d;
            --burgundy-accent: #c45567;
            --gold: #d4a853;
            --gold-light: #e8c97a;
            --white: #f5f0f1;
            --white-soft: #e0d5d8;
            --text-muted: #9a8a8e;
            --text-dim: #6b5a5f;
            --radius: 12px;
            --radius-sm: 8px;
            --radius-lg: 20px;
            --transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Raleway', sans-serif;
            background: var(--bg-primary);
            color: var(--white);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* ========== NAVBAR ========== */
        .navbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            padding: 0 60px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(26, 10, 14, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(123, 46, 58, 0.2);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--burgundy-accent), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--white-soft);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid rgba(123, 46, 58, 0.3);
            transition: var(--transition);
        }

        .back-btn:hover {
            background: rgba(123, 46, 58, 0.2);
            border-color: var(--burgundy-accent);
            color: var(--white);
        }

        /* ========== PLAYER CONTAINER ========== */
        .player-section {
            margin-top: 70px;
            background: #000;
            position: relative;
        }

        .player-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            aspect-ratio: 16/9;
            background: #000;
            overflow: hidden;
        }

        .player-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ========== CUSTOM CONTROLS OVERLAY ========== */
        .custom-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(26, 10, 14, 0.95));
            padding: 20px 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 10;
            pointer-events: none;
        }

        .player-wrapper:hover .custom-controls {
            opacity: 1;
            pointer-events: all;
        }

        /* Progress bar */
        .progress-container {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
            cursor: pointer;
            position: relative;
            transition: height 0.2s;
        }

        .progress-container:hover {
            height: 7px;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--burgundy), var(--burgundy-accent), var(--gold));
            border-radius: 4px;
            width: 0%;
            transition: width 0.3s;
            position: relative;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%) scale(0);
            width: 14px;
            height: 14px;
            background: var(--burgundy-accent);
            border-radius: 50%;
            border: 2px solid var(--white);
            box-shadow: 0 0 10px rgba(196, 85, 103, 0.5);
            transition: transform 0.2s;
        }

        .progress-container:hover .progress-bar::after {
            transform: translateY(-50%) scale(1);
        }

        /* Control buttons row */
        .controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .controls-left, .controls-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .ctrl-btn {
            background: none;
            border: none;
            color: var(--white-soft);
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
        }

        .ctrl-btn:hover {
            color: var(--white);
            background: rgba(123, 46, 58, 0.3);
            transform: scale(1.1);
        }

        .ctrl-btn.play-btn {
            font-size: 24px;
            width: 48px;
            height: 48px;
            background: rgba(123, 46, 58, 0.3);
        }

        .ctrl-btn.play-btn:hover {
            background: var(--burgundy);
            box-shadow: 0 0 20px rgba(123, 46, 58, 0.4);
        }

        .time-display {
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .now-playing {
            color: var(--white-soft);
            font-size: 13px;
            font-weight: 500;
        }

        .now-playing span {
            color: var(--burgundy-accent);
            font-weight: 600;
        }

        /* Volume slider */
        .volume-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .volume-slider {
            -webkit-appearance: none;
            width: 80px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            outline: none;
            opacity: 0;
            width: 0;
            transition: all 0.3s;
        }

        .volume-group:hover .volume-slider {
            opacity: 1;
            width: 80px;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: var(--burgundy-accent);
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid var(--white);
        }

        /* Quality selector */
        .quality-selector {
            position: relative;
        }

        .quality-btn {
            background: rgba(123, 46, 58, 0.3);
            border: 1px solid rgba(160, 64, 77, 0.4);
            color: var(--gold);
            padding: 4px 12px;
            border-radius: 6px;
            font-family: 'Raleway', sans-serif;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            letter-spacing: 0.5px;
        }

        .quality-btn:hover {
            background: var(--burgundy);
            border-color: var(--burgundy-accent);
        }

        .quality-dropdown {
            position: absolute;
            bottom: 100%;
            right: 0;
            margin-bottom: 8px;
            background: var(--bg-card);
            border: 1px solid rgba(123, 46, 58, 0.3);
            border-radius: var(--radius-sm);
            overflow: hidden;
            display: none;
            min-width: 120px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .quality-dropdown.show { display: block; }

        .quality-option {
            padding: 10px 16px;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
            color: var(--white-soft);
        }

        .quality-option:hover {
            background: rgba(123, 46, 58, 0.3);
        }

        .quality-option.active {
            color: var(--gold);
            background: rgba(123, 46, 58, 0.2);
        }

        .quality-option .badge {
            font-size: 10px;
            background: var(--burgundy);
            color: var(--white);
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 700;
        }

        /* ========== MOVIE INFO SECTION ========== */
        .movie-info-section {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 60px;
        }

        .movie-header {
            display: flex;
            gap: 40px;
            margin-bottom: 40px;
        }

        .movie-poster-large {
            width: 220px;
            height: 330px;
            object-fit: cover;
            border-radius: var(--radius-lg);
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
            flex-shrink: 0;
        }

        .movie-details { flex: 1; }

        .movie-details h1 {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 12px;
        }

        .movie-tags {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .tag {
            background: rgba(123, 46, 58, 0.3);
            border: 1px solid rgba(160, 64, 77, 0.3);
            color: var(--white-soft);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
        }

        .tag.gold {
            border-color: rgba(212, 168, 83, 0.4);
            color: var(--gold);
        }

        .movie-description {
            color: var(--text-muted);
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 24px;
            max-width: 700px;
        }

        .movie-meta-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .meta-item {
            background: var(--bg-card);
            padding: 16px 20px;
            border-radius: var(--radius);
            border: 1px solid rgba(123, 46, 58, 0.1);
        }

        .meta-label {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 4px;
        }

        .meta-value {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 600;
        }

        .meta-value.gold { color: var(--gold); }

        /* ========== RATINGS SECTION ========== */
        .ratings-section {
            margin-top: 40px;
            padding-top: 40px;
            border-top: 1px solid rgba(123, 46, 58, 0.15);
        }

        .ratings-title {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .ratings-title .accent { color: var(--burgundy-accent); }

        .ratings-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .rating-card {
            background: var(--bg-card);
            padding: 24px;
            border-radius: var(--radius);
            border: 1px solid rgba(123, 46, 58, 0.1);
            text-align: center;
            transition: var(--transition);
        }

        .rating-card:hover {
            border-color: rgba(123, 46, 58, 0.3);
            transform: translateY(-4px);
        }

        .rating-source {
            font-size: 14px;
            font-weight: 600;
            color: var(--white-soft);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .rating-score {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            font-weight: 800;
            color: var(--gold);
        }

        .rating-scale {
            font-size: 14px;
            color: var(--text-dim);
        }

        /* ========== CAST SECTION ========== */
        .cast-section {
            margin-top: 40px;
            padding-top: 40px;
            border-top: 1px solid rgba(123, 46, 58, 0.15);
        }

        .cast-list {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .cast-chip {
            background: var(--bg-card);
            border: 1px solid rgba(123, 46, 58, 0.15);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            color: var(--white-soft);
            transition: var(--transition);
        }

        .cast-chip:hover {
            border-color: var(--burgundy-accent);
            background: var(--bg-card-hover);
        }

        /* ========== RELATED CONTENT ========== */
        .related-section {
            margin-top: 40px;
            padding-top: 40px;
            border-top: 1px solid rgba(123, 46, 58, 0.15);
        }

        .related-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
        }

        .related-card {
            position: relative;
            border-radius: var(--radius);
            overflow: hidden;
            cursor: pointer;
            transition: var(--transition);
        }

        .related-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.4);
        }

        .related-card img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
        }

        .related-card:hover img { filter: brightness(0.5); }

        .related-info {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 16px;
            background: linear-gradient(transparent, rgba(26, 10, 14, 0.95));
        }

        .related-info h4 {
            font-family: 'Playfair Display', serif;
            font-size: 14px;
            font-weight: 600;
        }

        .related-info span {
            font-size: 12px;
            color: var(--text-muted);
        }

        .related-play {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 48px; height: 48px;
            background: linear-gradient(135deg, var(--burgundy), var(--burgundy-light));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: var(--transition);
        }

        .related-card:hover .related-play {
            transform: translate(-50%, -50%) scale(1);
        }

        /* ========== LOADING ========== */
        .loading {
            text-align: center;
            padding: 80px;
            color: var(--text-muted);
            font-size: 16px;
        }

        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(123, 46, 58, 0.2);
            border-top-color: var(--burgundy-accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========== STREAMING TECH SECTION (Flyweight + Bridge) ========== */
        .streaming-section {
            margin-top: 40px;
            padding-top: 40px;
            border-top: 1px solid rgba(123, 46, 58, 0.15);
        }

        .streaming-title {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .streaming-title .accent { color: var(--burgundy-accent); }

        .streaming-subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 28px;
            letter-spacing: 0.5px;
        }

        .tech-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 32px;
        }

        .tech-card {
            background: var(--bg-card);
            border: 1px solid rgba(123, 46, 58, 0.15);
            border-radius: var(--radius);
            padding: 24px;
            transition: var(--transition);
        }

        .tech-card:hover {
            border-color: rgba(196, 85, 103, 0.3);
        }

        .tech-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .tech-card-title {
            font-family: 'Playfair Display', serif;
            font-size: 19px;
            font-weight: 700;
            color: var(--white);
        }

        .tech-card-pattern {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(212, 168, 83, 0.12);
            border: 1px solid rgba(212, 168, 83, 0.3);
            color: var(--gold);
        }

        .tech-card-desc {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 18px;
            line-height: 1.6;
        }

        .selector-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .selector-btn {
            background: rgba(123, 46, 58, 0.15);
            border: 1px solid rgba(160, 64, 77, 0.25);
            color: var(--white-soft);
            padding: 10px 18px;
            border-radius: 24px;
            font-family: 'Raleway', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .selector-btn:hover {
            background: rgba(123, 46, 58, 0.3);
            border-color: var(--burgundy-accent);
            color: var(--white);
            transform: translateY(-1px);
        }

        .selector-btn.active {
            background: linear-gradient(135deg, var(--burgundy), var(--burgundy-light));
            border-color: var(--burgundy-accent);
            color: var(--white);
            box-shadow: 0 4px 14px rgba(123, 46, 58, 0.35);
        }

        .tech-info {
            background: rgba(26, 10, 14, 0.5);
            border: 1px solid rgba(123, 46, 58, 0.1);
            border-radius: var(--radius-sm);
            padding: 14px 18px;
            font-size: 13px;
            color: var(--white-soft);
            line-height: 1.7;
            min-height: 100px;
        }

        .tech-info b { color: var(--gold); }
        .tech-info .label { color: var(--text-dim); font-size: 11px; letter-spacing: 1.2px; text-transform: uppercase; }
        .tech-info .row { display: flex; justify-content: space-between; padding: 4px 0; }

        .cache-hit-banner {
            margin-top: 12px;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: fadeInUp 0.4s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .cache-hit-banner.shared {
            background: rgba(212, 168, 83, 0.12);
            border: 1px solid rgba(212, 168, 83, 0.4);
            color: var(--gold);
        }

        .cache-hit-banner.new {
            background: rgba(123, 46, 58, 0.18);
            border: 1px solid rgba(160, 64, 77, 0.4);
            color: var(--burgundy-accent);
        }

        /* Active sessions panel */
        .sessions-panel {
            background: var(--bg-card);
            border: 1px solid rgba(123, 46, 58, 0.15);
            border-radius: var(--radius);
            padding: 24px;
        }

        .sessions-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .sessions-stats {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }

        .stat-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .stat-pill b {
            color: var(--gold);
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            font-weight: 700;
        }

        .sessions-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .session-item {
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 14px;
            align-items: center;
            padding: 12px 16px;
            background: rgba(26, 10, 14, 0.5);
            border-radius: var(--radius-sm);
            border-left: 3px solid transparent;
            transition: var(--transition);
            font-size: 13px;
        }

        .session-item.you {
            border-left-color: var(--gold);
            background: rgba(212, 168, 83, 0.06);
        }

        .session-item.same-quality {
            border-left-color: var(--burgundy-accent);
        }

        .session-user {
            color: var(--white);
            font-weight: 600;
        }

        .session-content {
            color: var(--text-muted);
            font-size: 12px;
        }

        .session-quality-badge {
            background: rgba(123, 46, 58, 0.3);
            border: 1px solid rgba(160, 64, 77, 0.3);
            color: var(--gold);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .session-device {
            color: var(--text-dim);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .empty-sessions {
            color: var(--text-dim);
            text-align: center;
            padding: 24px;
            font-size: 13px;
            font-style: italic;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            .navbar { padding: 0 20px; }
            .movie-info-section { padding: 24px 20px; }
            .movie-header { flex-direction: column; align-items: center; text-align: center; }
            .movie-details h1 { font-size: 28px; }
            .ratings-grid { grid-template-columns: 1fr; }
            .related-grid { grid-template-columns: repeat(2, 1fr); }
            .movie-meta-grid { grid-template-columns: 1fr 1fr; }
            .tech-grid { grid-template-columns: 1fr; }
            .session-item { grid-template-columns: 1fr; gap: 6px; }
        }
   .player-cover {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #000;
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity 0.5s ease;
}

.player-cover.hidden {
    opacity: 0;
    pointer-events: none;
}

.player-wrapper {
    overflow: hidden;
}
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <a href="/" class="logo">STREAMZONE</a>
        <a href="/" class="back-btn">← Înapoi la catalog</a>
    </nav>

    <!-- PLAYER -->
    <section class="player-section">
        <div class="player-wrapper" id="player-wrapper">
            <div class="loading" id="player-loading">
                <div class="spinner"></div>
                Se încarcă playerul...
            </div>
            <div id="youtube-player"></div>
            <div class="player-cover" id="player-cover">
    <div class="spinner"></div>
    <div style="color: var(--text-muted); margin-top: 10px;">Se încarcă trailerul...</div>
</div>

            <!-- Custom controls overlay -->
            <div class="custom-controls" id="custom-controls">
                <div class="progress-container" id="progress-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
                <div class="controls-row">
                    <div class="controls-left">
                        <button class="ctrl-btn play-btn" id="btn-play" onclick="togglePlay()">▶</button>
                        <button class="ctrl-btn" onclick="skip(-10)" title="-10s">↺</button>
                        <button class="ctrl-btn" onclick="skip(10)" title="+10s">↻</button>
                        <div class="volume-group">
                            <button class="ctrl-btn" id="btn-volume" onclick="toggleMute()">♪</button>
                            <input type="range" class="volume-slider" id="volume-slider" min="0" max="100" value="100"
                                oninput="setVolume(this.value)">
                        </div>
                        <span class="time-display" id="time-display">0:00 / 0:00</span>
                    </div>
                    <div class="controls-right">
                        <span class="now-playing">Acum: <span id="now-playing-title">...</span></span>
                        <div class="quality-selector">
                            <button class="quality-btn" id="quality-btn" onclick="toggleQualityMenu()">HD</button>
                            <div class="quality-dropdown" id="quality-dropdown">
                                <div class="quality-option" onclick="setQuality('small')">360p</div>
                                <div class="quality-option" onclick="setQuality('medium')">480p</div>
                                <div class="quality-option active" onclick="setQuality('large')">720p <span class="badge">HD</span></div>
                                <div class="quality-option" onclick="setQuality('hd1080')">1080p <span class="badge">FHD</span></div>
                            </div>
                        </div>
                        <button class="ctrl-btn" onclick="toggleFullscreen()">⛶</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- MOVIE INFO -->
    <section class="movie-info-section" id="movie-info">
        <div class="loading" id="info-loading">
            <div class="spinner"></div>
            Se încarcă informațiile...
        </div>
    </section>

    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        const API = 'http://localhost:5000/api';

        // YouTube trailer IDs pentru fiecare film/serial moldovenesc
        const TRAILERS = {
            'Carbon': 'xvFZjo5PgG0',
            'Hotarul': 'dT_EBkO7A9k',
            'Abis': 'xvFZjo5PgG0',
            'Puterea Probabilitatii': 'xvFZjo5PgG0',
            'Lăutarii': 'dT_EBkO7A9k',
            'Plaha': 'xvFZjo5PgG0',
            'Moldova: Inima de Vin': 'xvFZjo5PgG0',
            'Chișinău — Memorii': 'xvFZjo5PgG0'
        };

        const POSTER_MAP = {
            'Carbon': 'https://m.media-amazon.com/images/M/MV5BODY1OGIxOTItM2Q4OC00ZGQyLWIwOWUtMWU4NzZkODI2MDJhXkEyXkFqcGc@._V1_UX800_.jpg',
            'Hotarul': 'https://m.media-amazon.com/images/M/MV5BMTZhN2FlMDItMWY4ZS00OTY3LTk0ZTYtYmU0MDUzYWI5YzMyXkEyXkFqcGc@._V1_UX800_.jpg',
            'Abis': 'https://cineplex.md/posters/Abis%20RO.jpg',
            'Puterea Probabilitatii': 'https://m.media-amazon.com/images/M/MV5BMDA0Yjk5ZjQtYjY4MC00N2RjLWFhYjctNDZhYjRkYWZjOWYyXkEyXkFqcGc@._V1_UX800.jpg',
            'Lăutarii': 'https://m.media-amazon.com/images/M/MV5BNjkwZDdiYzQtYmY3OS00NmI3LWIzZTMtMzMyMzhjYjk3NGI1XkEyXkFqcGc@._V1_.jpg',
            'Plaha': 'https://images.kinorium.com/movie/1080/11994379.jpg?1759733447',
            'Moldova: Inima de Vin': 'https://images.unsplash.com/photo-1510812431401-41d2bd2722f3?w=400&h=600&fit=crop',
            'Chișinău — Memorii': 'https://images.unsplash.com/photo-1486325212027-8081e485255e?w=400&h=600&fit=crop'
        };

        // Obținem titlul din URL
        const urlParams = new URLSearchParams(window.location.search);
        const movieTitle = urlParams.get('title') || 'Carbon';

        let player;
        let progressInterval;

        // YouTube API ready
        function onYouTubeIframeAPIReady() {
            const videoId = TRAILERS[movieTitle] || 'YoHD9XEInc0';

            player = new YT.Player('youtube-player', {
                videoId: videoId,
                playerVars: {
                    autoplay: 1,
                    controls: 0,
                    modestbranding: 1,
                    rel: 0,
                    showinfo: 0,
                    iv_load_policy: 3,
                    fs: 0,
                    disablekb: 0,
                    playsinline: 1
                },
                events: {
                    onReady: onPlayerReady,
                    onStateChange: onPlayerStateChange
                }
            });
        }

        function onPlayerReady(event) {
            document.getElementById('player-loading').style.display = 'none';
            document.getElementById('now-playing-title').textContent = movieTitle;
            document.title = `StreamZone — ${movieTitle}`;

            // Actualizăm progresul la fiecare secundă
            progressInterval = setInterval(updateProgress, 500);

            // Notificăm API-ul
            fetch(`${API}/play/${encodeURIComponent(movieTitle)}`, { method: 'POST' });

            event.target.playVideo();
            // Ascundem cover-ul după 1.5 secunde (YouTube își ascunde UI-ul)
              setTimeout(() => {
                document.getElementById('player-cover').classList.add('hidden');
            }, 3000);
        }

        function onPlayerStateChange(event) {
            const playBtn = document.getElementById('btn-play');
            if (event.data === YT.PlayerState.PLAYING) {
                playBtn.textContent = '❚❚';
            } else if (event.data === YT.PlayerState.PAUSED) {
                playBtn.textContent = '▶';
            } else if (event.data === YT.PlayerState.ENDED) {
                playBtn.textContent = '↻';
            }
        }

        function updateProgress() {
            if (!player || !player.getCurrentTime) return;

            const current = player.getCurrentTime();
            const duration = player.getDuration();

            if (duration > 0) {
                const percent = (current / duration) * 100;
                document.getElementById('progress-bar').style.width = percent + '%';
                document.getElementById('time-display').textContent =
                    `${formatTime(current)} / ${formatTime(duration)}`;
            }
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        // ========== CONTROLS ==========

        function togglePlay() {
            if (!player) return;
            const state = player.getPlayerState();
            if (state === YT.PlayerState.PLAYING) {
                player.pauseVideo();
            } else {
                player.playVideo();
            }
        }

        function skip(seconds) {
            if (!player) return;
            player.seekTo(player.getCurrentTime() + seconds, true);
        }

        function toggleMute() {
            if (!player) return;
            if (player.isMuted()) {
                player.unMute();
                document.getElementById('btn-volume').textContent = '♪';
                document.getElementById('volume-slider').value = player.getVolume();
            } else {
                player.mute();
                document.getElementById('btn-volume').textContent = '✕';
                document.getElementById('volume-slider').value = 0;
            }
        }

        function setVolume(val) {
            if (!player) return;
            player.setVolume(val);
           document.getElementById('btn-volume').textContent = val == 0 ? '✕' : '♪';
        }

        function toggleFullscreen() {
            const wrapper = document.getElementById('player-wrapper');
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                wrapper.requestFullscreen();
            }
        }

        function toggleQualityMenu() {
            document.getElementById('quality-dropdown').classList.toggle('show');
        }

        function setQuality(quality) {
            if (!player) return;
            player.setPlaybackQuality(quality);

            const labels = { small: '360p', medium: '480p', large: 'HD', hd1080: 'FHD' };
            document.getElementById('quality-btn').textContent = labels[quality] || 'HD';

            document.querySelectorAll('.quality-option').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('quality-dropdown').classList.remove('show');
        }

        // Progress bar click to seek
        document.getElementById('progress-container').addEventListener('click', (e) => {
            if (!player) return;
            const rect = e.target.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            player.seekTo(pos * player.getDuration(), true);
        });

        // Close quality menu on outside click
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.quality-selector')) {
                document.getElementById('quality-dropdown').classList.remove('show');
            }
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case ' ': e.preventDefault(); togglePlay(); break;
                case 'ArrowLeft': skip(-10); break;
                case 'ArrowRight': skip(10); break;
                case 'ArrowUp': e.preventDefault(); setVolume(Math.min(100, player.getVolume() + 10)); break;
                case 'ArrowDown': e.preventDefault(); setVolume(Math.max(0, player.getVolume() - 10)); break;
                case 'f': toggleFullscreen(); break;
                case 'm': toggleMute(); break;
            }
        });

        // ========== LOAD MOVIE INFO ==========

        async function loadMovieInfo() {
            try {
                const res = await fetch(`${API}/content`);
                const allContent = await res.json();
                const movie = allContent.find(c => c.title === movieTitle);

                if (!movie) {
                    document.getElementById('movie-info').innerHTML =
                        '<div style="padding:40px;color:#c45567;">Conținutul nu a fost găsit.</div>';
                    return;
                }

                // Rating extern
                let externalRatings = '';
                try {
                    const rRes = await fetch(`${API}/ratings/${encodeURIComponent(movieTitle)}`);
                    const rData = await rRes.json();
                    externalRatings = rData.details || '';
                } catch(e) {}

                const poster = POSTER_MAP[movieTitle] || '';

                document.getElementById('info-loading').style.display = 'none';
                document.getElementById('movie-info').innerHTML = `
                    <div class="movie-header">
                        <img src="${poster}" class="movie-poster-large" alt="${movie.title}"
                             onerror="this.style.display='none'">
                        <div class="movie-details">
                            <h1>${movie.title}</h1>
                            <div class="movie-tags">
                                <span class="tag">${movie.type}</span>
                                <span class="tag">${movie.genre}</span>
                                <span class="tag">${movie.contentRating}</span>
                                <span class="tag gold">★ ${movie.externalRating || movie.averageRating}/10</span>
                            </div>
                            <p class="movie-description">${movie.description}</p>
                            <div class="movie-meta-grid">
                                <div class="meta-item">
                                    <div class="meta-label">Regizor / Creator</div>
                                    <div class="meta-value">${movie.director}</div>
                                </div>
                                <div class="meta-item">
                                    <div class="meta-label">Durată</div>
                                    <div class="meta-value">${movie.duration} min</div>
                                </div>
                                <div class="meta-item">
                                    <div class="meta-label">Vizualizări</div>
                                    <div class="meta-value">${movie.views}</div>
                                </div>
                                <div class="meta-item">
                                    <div class="meta-label">Rating extern</div>
                                    <div class="meta-value gold">★ ${movie.externalRating || 'N/A'}/10</div>
                                </div>
                            </div>
                            ${movie.cast && movie.cast.length > 0 ? `
                                <div class="cast-section" style="margin-top:0;padding-top:0;border:none;">
                                    <h3 class="ratings-title" style="font-size:20px;">Distribuție</h3>
                                    <div class="cast-list">
                                        ${movie.cast.map(a => `<span class="cast-chip">🎭 ${a}</span>`).join('')}
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                    </div>

                    <!-- ========== STREAMING TECH (Flyweight + Bridge) ========== -->
                    <div class="streaming-section">
                        <h3 class="streaming-title">Detalii <span class="accent">Streaming</span></h3>
                        <p class="streaming-subtitle">Configurează dispozitivul și calitatea streamului — în culise rulează pattern-urile Bridge și Flyweight</p>

                        <div class="tech-grid">
                            <!-- BRIDGE: Device selector -->
                            <div class="tech-card">
                                <div class="tech-card-header">
                                    <h4 class="tech-card-title">Dispozitiv</h4>
                                    <span class="tech-card-pattern">Bridge</span>
                                </div>
                                <p class="tech-card-desc">Schimbă dispozitivul la runtime — abstracția (player) rămâne aceeași, doar implementarea (rendererul) se înlocuiește.</p>
                                <div class="selector-row" id="device-selector">
                                    <button class="selector-btn active" data-device="desktop">🖥 Desktop</button>
                                    <button class="selector-btn" data-device="smarttv">📺 Smart TV</button>
                                    <button class="selector-btn" data-device="mobile">📱 Mobile</button>
                                    <button class="selector-btn" data-device="tablet">⬜ Tabletă</button>
                                </div>
                                <div class="tech-info" id="bridge-info">
                                    <span class="label">Se încarcă...</span>
                                </div>
                            </div>

                            <!-- FLYWEIGHT: Quality selector -->
                            <div class="tech-card">
                                <div class="tech-card-header">
                                    <h4 class="tech-card-title">Calitate Stream</h4>
                                    <span class="tech-card-pattern">Flyweight</span>
                                </div>
                                <p class="tech-card-desc">Toate sesiunile cu aceeași rezoluție partajează un SINGUR obiect StreamQuality din pool — zero duplicare în memorie.</p>
                                <div class="selector-row" id="quality-selector">
                                    <button class="selector-btn" data-quality="360p">360p</button>
                                    <button class="selector-btn" data-quality="480p">480p</button>
                                    <button class="selector-btn" data-quality="720p">720p</button>
                                    <button class="selector-btn active" data-quality="1080p">1080p</button>
                                    <button class="selector-btn" data-quality="4K">4K</button>
                                    <button class="selector-btn" data-quality="4KUHD">4K UHD</button>
                                </div>
                                <div class="tech-info" id="flyweight-info">
                                    <span class="label">Se încarcă...</span>
                                </div>
                                <div id="cache-hit-banner"></div>
                            </div>
                        </div>

                        <!-- Active sessions panel -->
                        <div class="sessions-panel">
                            <div class="sessions-header">
                                <div>
                                    <h4 class="tech-card-title">Sesiuni Active pe Platformă</h4>
                                    <p style="color: var(--text-muted); font-size: 12px; margin-top: 4px;">Sesiuni cu aceeași calitate folosesc același obiect StreamQuality din pool</p>
                                </div>
                                <div class="sessions-stats" id="sessions-stats">
                                    <span class="stat-pill">Pool: <b id="stat-pool">—</b></span>
                                    <span class="stat-pill">Sesiuni: <b id="stat-sessions">—</b></span>
                                    <span class="stat-pill">Cache hits: <b id="stat-hits">—</b></span>
                                </div>
                            </div>
                            <div class="sessions-list" id="sessions-list">
                                <div class="empty-sessions">Se încarcă sesiunile active...</div>
                            </div>
                        </div>
                    </div>

                    <!-- Related content -->
                    <div class="related-section">
                        <h3 class="ratings-title">Conținut <span class="accent">Similar</span></h3>
                        <div class="related-grid" id="related-grid"></div>
                    </div>
                `;

                // Load related content
                const related = allContent.filter(c => c.title !== movieTitle).slice(0, 5);
                document.getElementById('related-grid').innerHTML = related.map(c => `
                    <a href="watch.html?title=${encodeURIComponent(c.title)}" class="related-card" style="text-decoration:none;color:inherit;">
                        <img src="${POSTER_MAP[c.title] || ''}" alt="${c.title}"
                             onerror="this.src='https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=400&h=600&fit=crop'">
                        <div class="related-play">▶</div>
                        <div class="related-info">
                            <h4>${c.title}</h4>
                            <span>${c.genre} • ${c.type}</span>
                        </div>
                    </a>
                `).join('');

                // ========== INIT BRIDGE + FLYWEIGHT ==========
                initStreamingTech();

            } catch (e) {
                document.getElementById('movie-info').innerHTML =
                    '<div style="padding:40px;color:#c45567;">❌ API nu e pornit. Rulează: dotnet run</div>';
            }
        }

        // ============================================================
        // BRIDGE + FLYWEIGHT INTEGRATION
        // ============================================================

        // Stare locală pentru sesiunea curentă (nu persistată — se resetează la refresh)
        const VIEWER_NAME = 'Vizitator-' + Math.floor(Math.random() * 9000 + 1000);
        let currentDevice = 'desktop';
        let currentQuality = '1080p';

        async function initStreamingTech() {
            // Wire up device buttons
            document.querySelectorAll('#device-selector .selector-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('#device-selector .selector-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentDevice = btn.dataset.device;
                    callBridge();
                });
            });

            // Wire up quality buttons
            document.querySelectorAll('#quality-selector .selector-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('#quality-selector .selector-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentQuality = btn.dataset.quality;
                    createFlyweightSession();
                });
            });

            // Apel inițial — pornim sesiunea curentă
            await callBridge();
            await createFlyweightSession();
        }

        async function callBridge() {
            try {
                const res = await fetch(`${API}/bridge/play`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        playerType: 'video',
                        device: currentDevice,
                        contentTitle: movieTitle,
                        quality: currentQuality
                    })
                });
                const data = await res.json();

                document.getElementById('bridge-info').innerHTML = `
                    <div class="row"><span class="label">Player</span><span><b>${data.player}</b></span></div>
                    <div class="row"><span class="label">Device</span><span><b>${data.device}</b></span></div>
                    <div class="row"><span class="label">Capabilități</span><span style="font-size: 12px; color: var(--text-muted); text-align: right;">${(data.deviceCapabilities || '').split('|').slice(0,2).join(' |')}</span></div>
                    <div class="row" style="border-top: 1px solid rgba(123,46,58,0.1); margin-top: 6px; padding-top: 8px;">
                        <span style="font-size: 11px; color: var(--burgundy-accent); font-style: italic;">${data.bridgeCall}</span>
                    </div>
                `;
            } catch (e) {
                document.getElementById('bridge-info').innerHTML =
                    '<span style="color: var(--burgundy-accent);">❌ Bridge API indisponibil</span>';
            }
        }

        async function createFlyweightSession() {
            try {
                const res = await fetch(`${API}/flyweight/sessions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userName: VIEWER_NAME,
                        contentTitle: movieTitle,
                        device: capitalizeDevice(currentDevice),
                        quality: currentQuality
                    })
                });
                const data = await res.json();

                if (!data.flyweightInfo) return;

                const fw = data.flyweightInfo;
                const sess = data.session;

                document.getElementById('flyweight-info').innerHTML = `
                    <div class="row"><span class="label">Rezoluție</span><span><b>${sess.quality}</b></span></div>
                    <div class="row"><span class="label">Detalii</span><span style="font-size: 12px; color: var(--text-muted); text-align: right;">${sess.qualityDetails}</span></div>
                    <div class="row"><span class="label">Pool size</span><span><b>${fw.poolSize}</b> obiecte unice</span></div>
                `;

                // Cache hit banner
                const banner = document.getElementById('cache-hit-banner');
                if (fw.cacheHit) {
                    const sharedList = fw.sharedWith && fw.sharedWith.length > 0
                        ? ` cu: <b>${fw.sharedWith.join(', ')}</b>`
                        : '';
                    banner.className = 'cache-hit-banner shared';
                    banner.innerHTML = `♻ Obiect <b>${sess.quality}</b> partajat din pool${sharedList} — zero alocare nouă!`;
                } else {
                    banner.className = 'cache-hit-banner new';
                    banner.innerHTML = `✨ Obiect <b>${sess.quality}</b> creat și adăugat în pool (prima sesiune cu această calitate)`;
                }

                // Refresh sessions panel
                await loadSessions();
            } catch (e) {
                document.getElementById('flyweight-info').innerHTML =
                    '<span style="color: var(--burgundy-accent);">❌ Flyweight API indisponibil</span>';
            }
        }

        async function loadSessions() {
            try {
                const res = await fetch(`${API}/flyweight/sessions`);
                const data = await res.json();

                document.getElementById('stat-pool').textContent = data.poolStats.poolSize;
                document.getElementById('stat-sessions').textContent = data.sessions.length;
                document.getElementById('stat-hits').textContent = data.poolStats.cacheHits;

                const list = document.getElementById('sessions-list');
                if (!data.sessions.length) {
                    list.innerHTML = '<div class="empty-sessions">Nicio sesiune activă încă.</div>';
                    return;
                }

                list.innerHTML = data.sessions.map(s => {
                    const isYou = s.userName === VIEWER_NAME;
                    const sameQuality = s.quality === currentQuality;
                    const cls = isYou ? 'you' : (sameQuality ? 'same-quality' : '');
                    return `
                        <div class="session-item ${cls}">
                            <div>
                                <div class="session-user">${isYou ? '⭐ Tu' : '👤 ' + s.userName}</div>
                                <div class="session-content">${s.contentTitle} • ${s.startedAt}</div>
                            </div>
                            <span class="session-device">${s.device}</span>
                            <span class="session-quality-badge">${s.quality}</span>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                console.error('Sessions load error:', e);
            }
        }

        function capitalizeDevice(d) {
            const map = { desktop: 'Desktop', smarttv: 'Smart TV', mobile: 'Mobile', tablet: 'Tabletă' };
            return map[d] || d;
        }

        loadMovieInfo();
    </script>
</body>
</html>
